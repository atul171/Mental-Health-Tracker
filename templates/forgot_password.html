{% extends "base.html" %}
{% block content %}
<div class="container mt-5" style="max-width:480px">
  <div class="card shadow-sm">
    <div class="card-body p-4">
      <h4 class="mb-1">Forgot Password</h4>
      <p class="text-muted small mb-4">Enter your registered mobile number to receive an OTP.</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
          <div class="alert alert-{{ cat }}">{{ msg }}</div>
        {% endfor %}
      {% endwith %}

      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Mobile Number</label>
          <input type="tel" name="phone" class="form-control"
                 required placeholder="10-digit mobile number" maxlength="10">
        </div>
        <button type="submit" class="btn btn-primary w-100">Send OTP</button>
      </form>
      <div class="text-center mt-3">
        <a href="{{ url_for('login') }}" class="text-muted small">← Back to Login</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
