{% extends "base.html" %}
{% block content %}
<div class="container mt-5" style="max-width:480px">
  <div class="card shadow-sm">
    <div class="card-body p-4">
      <h4 class="mb-1">Enter OTP</h4>
      <p class="text-muted small mb-4">Enter the 6-digit OTP sent to your mobile. Valid for 10 minutes.</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
          <div class="alert alert-{{ cat }}">{{ msg }}</div>
        {% endfor %}
      {% endwith %}

      <form method="POST">
        <div class="mb-3">
          <label class="form-label">OTP</label>
          <input type="text" name="otp" class="form-control text-center"
                 required maxlength="6" placeholder="······"
                 style="font-size:1.5rem;letter-spacing:0.5rem">
        </div>
        <button type="submit" class="btn btn-primary w-100">Verify OTP</button>
      </form>
      <div class="text-center mt-3">
        <a href="{{ url_for('forgot_password') }}" class="text-muted small">Resend OTP</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
